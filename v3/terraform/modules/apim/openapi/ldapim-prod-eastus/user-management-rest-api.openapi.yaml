openapi: 3.0.1
info:
  title: User Management REST API
  description: This API allow customers to create users for their organization.
  termsOfService: https://www.lifedatacorp.com/lifedata-terms-of-use/
  contact:
    name: Lifedata Corp
    url: https://www.lifedatacorp.com/
    email: info@lifedatacorp.com
  license:
    name: Lifedata license
    url: https://www.lifedatacorp.com/license
  version: '1.0'
servers:
  - url: https://api.lifedatacorp.com/user
paths:
  /user/create-user:
    post:
      tags:
        - Web User
      summary: Create new Web User for LifeData Web App
      description: "This API will receive an Email Address in Request Body. \nThen It will check if the Email already exist in our Active Directory. \nIf it is found then it will return a 403 response. \nOtherwise it will create a new User in the Active Directory by calling Microsoft Graph api. \nOnce the user is created, it will run a Stored Procedure with the Email Address and create a new User Record in LifeData DB and return the UserID. \nThen the UserID will be added to the Active Directory user as an Directory Extension property. \nFinally it will return the UserID as the response of this API.\n"
      operationId: post-user-create-user
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing the User information
        content:
          application/json:
            schema:
              type: object
              properties:
                DisplayName:
                  type: string
                  example: John Doe
                UserEmail:
                  type: string
                  example: john.doe@test.com
                ProfilePictureFilePath:
                  type: string
                  description: File path to the customer's profile picture
                  example: user-profile/123.png
            example:
              DisplayName: John Doe
              UserEmail: john.doe@test.com
              ProfilePictureFilePath: user-profile/123.png
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWeb'
              example:
                UserID: '1'
  /user/getUserIDForLoggedInUser:
    get:
      tags:
        - Web User
      summary: Retrieve and return the UserID for the logged-in user.
      description: "This API will first check if it has an Authorization Header.\nIf no Authorization Header is found it will return 403.\nIf it has an Authorization Header, it will read the provided Access Token segment in the Authorization Header.\nThen it will parse the Access Token and retrieve the OID(ObjectID) for the logged-in user.\nWith this ObjectID it will make a GET call to Microsoft Graph API to retrieve the User Detail.\nFrom the Response of the Graph API, it will read the Directory Extension that store the UserID of this logged-in person.\nFinally the UserID will be returned as response of this API.\n"
      operationId: get-user-getuseridforloggedinuser
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWeb'
              example:
                UserID: '1'
  /user/getUserDetails:
    get:
      tags:
        - Web User
      summary: Retrieve and return the User Details for the logged-in user.
      description: "This API will first check if it has an Authorization Header.\nIf no Authorization Header is found it will return 403.\nIf it has an Authorization Header, it will read the provided Access Token segment in the Authorization Header.\nThen it will parse the Access Token and retrieve the OID(ObjectID) for the logged-in user.\nWith this ObjectID it will make a GET call to Microsoft Graph API to retrieve the User Detail.\nFrom the Response of the Graph API, it will read the Directory Extension that store the UserID, Email and Display Name of this logged-in person.\nFinally the 3 properties will be returned as response of this API.\n"
      operationId: get-user-getuserdetails
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWebGetDetail'
              example:
                UserID: '1'
                Email: testuser@test.com
                DisplayName: John Doe
                ProfilePictureFilePath: user-profile/123.png
  /user/permissions:
    get:
      tags:
        - Web User
      summary: User role and permission related information
      description: "This API will return an object. This object will contain UserRole, BasicPermissions, AllPermissions\n"
      operationId: get-user-permissions
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  UserRole:
                    type: array
                    items:
                      type: object
                      properties:
                        RoleID:
                          type: integer
                          example: 1
                  BasicPermissions:
                    type: array
                    items:
                      type: object
                      properties:
                        RoleID:
                          type: integer
                          example: 1
                        ObjectID:
                          type: integer
                          example: 1
                        ActionID:
                          type: integer
                          example: 1
                  AllPermissions:
                    type: array
                    items:
                      type: object
                      properties:
                        RoleID:
                          type: integer
                          example: 1
                        ObjectID:
                          type: integer
                          example: 1
                        LifeDataObjectID:
                          type: integer
                          example: 1
                        ActionID:
                          type: integer
                          example: 1
              example:
                UserRole:
                  - RoleID: 1
                BasicPermissions:
                  - RoleID: 1
                    ObjectID: 1
                    ActionID: 1
                AllPermissions:
                  - RoleID: 1
                    ObjectID: 1
                    LifeDataObjectID: 1
                    ActionID: 1
  /team/teamMembers:
    get:
      tags:
        - Team Management
      summary: Get all team members
      description: "This API will return all team members with UserID, UserIdentity, RoleID, RoleName, IsActive, InvitationDT, AcceptationDT, StatusType\n"
      operationId: get-team-teammembers
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    UserID:
                      type: integer
                      example: 1
                    InvitationID:
                      type: integer
                      example: 1
                    UserName:
                      type: string
                      example: Tim David
                    EmailID:
                      type: string
                      example: asd@asd.com
                    ProfilePictureFilePath:
                      type: string
                      description: File path to the customer's profile picture
                      example: user-profile/123.png
                    Phone:
                      type: string
                      description: Phone number of the team member
                      example: '8801612625374'
                    RoleID:
                      enum:
                        - 6
                        - 7
                        - 8
                        - 9
                        - 10
                        - 11
                      type: integer
                      description: "&nbsp;&nbsp;6 = Organization Admin<br>\n&nbsp;&nbsp;7 = Researcher<br>\n&nbsp;&nbsp;8 = Manager<br>\n&nbsp;&nbsp;9 = Assistant<br>\n&nbsp;&nbsp;10 = Viewer<br>\n&nbsp;&nbsp;11 = Guest\n"
                      example: 6
                    RoleName:
                      type: string
                      example: Admin
                    IsActive:
                      enum:
                        - '1'
                        - '0'
                      type: boolean
                      example: '1'
                    InvitationDT:
                      type: string
                      example: '2023-12-15T11:12:13Z'
                    AcceptationDT:
                      type: string
                      example: '2023-12-16T11:12:13Z'
                    StatusType:
                      type: integer
                      description: "&nbsp;&nbsp;1 = Invited<br>\n&nbsp;&nbsp;2 = Invitation Canceled<br>\n&nbsp;&nbsp;3 = Accepted<br>\n&nbsp;&nbsp;4 = Deactivated<br>\n&nbsp;&nbsp;5 = Deleted\n"
                      example: 1
              example:
                - UserID: 1
                  InvitationID: 1
                  UserName: Tim David
                  EmailID: asd@asd.com
                  ProfilePictureFilePath: user-profile/123.png
                  Phone: '8801612625374'
                  RoleID: 6
                  RoleName: Admin
                  IsActive: '1'
                  InvitationDT: '2023-12-15T11:12:13.0000000+00:00'
                  AcceptationDT: '2023-12-16T11:12:13.0000000+00:00'
                  StatusType: 1
  /team/inviteTeamMember:
    post:
      tags:
        - Team Management
      summary: Invite a team member
      description: "This API will return an object. This object will contain UserRole, BasicPermissions, AllPermissions\n"
      operationId: post-team-inviteteammember
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing user's email id and role id
        content:
          application/json:
            schema:
              type: object
              properties:
                UserName:
                  type: string
                  example: Tim David
                UserEmail:
                  type: string
                  example: asd.@asd.com
                RoleID:
                  enum:
                    - 6
                    - 7
                    - 8
                    - 9
                    - 10
                    - 11
                  type: integer
                  description: "&nbsp;&nbsp;6 = Organization Admin<br>\n&nbsp;&nbsp;7 = Researcher<br>\n&nbsp;&nbsp;8 = Manager<br>\n&nbsp;&nbsp;9 = Assistant<br>\n&nbsp;&nbsp;10 = Viewer<br>\n&nbsp;&nbsp;11 = Guest\n"
                  example: 6
            example:
              UserName: Tim David
              UserEmail: asd.@asd.com
              RoleID: 6
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  InviteID:
                    type: integer
                    example: 1
              example:
                InviteID: 1
  /team/acceptInvitation:
    put:
      tags:
        - Team Management
      summary: Accept invite as a team member
      description: Accept invite as a team member
      operationId: put-team-acceptinvitation
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing invitation id
        content:
          application/json:
            schema:
              type: object
              properties:
                InvitationID:
                  type: integer
                  example: 1
            example:
              InvitationID: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  CanUpdate:
                    type: integer
                    example: 1
              example:
                CanUpdate: 1
  /team/cancelInvitation:
    put:
      tags:
        - Team Management
      summary: Cancel invitation
      description: Cancel invitation
      operationId: put-team-cancelinvitation
      parameters:
        - name: Authorization
          in: header
