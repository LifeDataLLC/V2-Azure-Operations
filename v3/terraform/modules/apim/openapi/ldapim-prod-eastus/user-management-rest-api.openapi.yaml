      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  CanUpdate:
                    type: integer
                    description: Team member user id
                    example: 1
              example:
                CanUpdate: 1
  /team/activate:
    put:
      tags:
        - Team Management
      summary: Activate a team member
      description: Activate a team member
      operationId: put-team-activate
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing team member user id
        content:
          application/json:
            schema:
              type: object
              properties:
                TeamMemberID:
                  type: integer
                  example: 1
            example:
              TeamMemberID: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  CanUpdate:
                    type: integer
                    description: Team member user id
                    example: 1
              example:
                CanUpdate: 1
  /participant/anonymous:
    post:
      tags:
        - Mobile Participant
      summary: Create new Anonymous Participant for LifeData Mobile App
      description: "This API will first run a Stored Procedure and create the Anonymous user in LifeData Service. \nThe Stored Procedure will return the UserEmail and ParticipantID.\nThen it will generate a password for the user and using Graph API create a user in Active Directory.\nThe UserEmail and the generated Password will be used in creation of that UserID.\nOnce the user is created. It will then run another update user call using Microsoft Graph API.\nThis time, the ParticipantID will be added to the Active Directory User record as a Directory Extension Property.\nFinally the UserEmail, Password and ParticipantID will be returned as the response of this API.\n"
      operationId: post-participant-anonymous
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: Empty Request Body
        content:
          application/json:
            schema:
              type: object
              nullable: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantResponseModel'
              example:
                UserEmail: john.doe@test.com
                Password: d3j4v4@f5ff8
                ParticipantID: '1'
  /participant/delete:
    post:
      tags:
        - Mobile Participant
      summary: Delete Participant for LifeData Mobile App
      description: "This API will 1st Delete the user from lifedata DB and on error - Early exit\non success - call AD B2C API and delete user\non error - handle error\non success - return final.\n"
      operationId: post-participant-delete
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing the participant id with
        content:
          application/json:
            schema:
              type: object
              properties:
                ParticipantID:
                  type: integer
                  example: 1
            example:
              ParticipantID: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantResponseModel'
              example:
                UserEmail: john.doe@test.com
                Password: d3j4v4@f5ff8
                ParticipantID: '1'
  /participant/regular:
    post:
      tags:
        - Mobile Participant
      summary: Create new Regular Participant for LifeData Mobile App
      description: "This API will receive an UserEmail and Password in Request Body. \nThen It will check if the Email already exist in our Active Directory. \nIf it is found then it will return a 403 response. \nOtherwise it will create a new User in the Active Directory by calling Microsoft Graph api. \nOnce the user is created, it will run a Stored Procedure with the Email Address and create a new Registered Participant in LifeData DB and return the ParticipantID. \nThen the ParticipantID will be added to the Active Directory user as an Directory Extension property. \nFinally the UserEmail, Password and ParticipantID will be returned as the response of this API.\n"
      operationId: post-participant-regular
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON object containing the Email Address and password
        content:
          application/json:
            schema:
              type: object
              properties:
                UserEmail:
                  type: string
                  example: john.doe@test.com
                Password:
                  type: string
                  example: d3j4v4@f5ff8
            example:
              UserEmail: john.doe@test.com
              Password: d3j4v4@f5ff8
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantResponseModel'
              example:
                UserEmail: john.doe@test.com
                Password: d3j4v4@f5ff8
                ParticipantID: '1'
  /user/profile:
    put:
      tags:
        - Web User
      summary: Update user profile information
      description: Update user profile information
      operationId: put-user-profile
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing the User Profile information
        content:
          application/json:
            schema:
              type: object
              properties:
                DisplayName:
                  type: string
                  example: Amalesh Debnath
                Phone:
                  type: string
                  example: '+8801612625374'
                ProfilePictureFilePath:
                  type: string
                  description: File path to the customer's profile picture
                  example: user-profile/123.png
            example:
              DisplayName: Amalesh Debnath
              Phone: '+8801612625374'
              ProfilePictureFilePath: user-profile/123.png
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
  /user/address:
    put:
      tags:
        - Web User
      summary: Update user address
      description: Update user address
      operationId: put-user-address
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing the User Address information
        content:
          application/json:
            schema:
              type: object
              properties:
                Country:
                  type: string
                  example: USA
                State:
                  type: string
                  example: Indiana
                City:
                  type: string
                  example: Marion
                PostalCode:
                  type: string
                  example: '46952'
                AddressLine1:
                  type: string
                  example: 1800 N
                AddressLine2:
                  type: string
                  example: Wabash Rd
                AddressLine3:
                  type: string
                  example: ''
            example:
              Country: USA
              State: Indiana
              City: Marion
              PostalCode: '46952'
              AddressLine1: 1800 N
              AddressLine2: Wabash Rd
              AddressLine3: ''
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
  /participant/ownStudy:
