  '/team/studyAccess/{TeamMemberID}':
    get:
      tags:
        - Team Management
      summary: Team Member Study Access Detail
      description: This API will return Team Member Study Access Detail
      operationId: get-team-studyaccess-teammemberid
      parameters:
        - name: TeamMemberID
