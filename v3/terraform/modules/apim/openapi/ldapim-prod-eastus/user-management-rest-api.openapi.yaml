                      type: integer
                      description: The study id
                      example: 123
                    StudyTitle:
                      type: string
                      description: The Study Title
                      example: Welcome to LifeData
                    ActionIDs:
                      type: string
                      description: Comma separated Action IDs
                      example: '1,2,4,5'
                    ActionTitles:
                      type: string
                      description: Comma separated Action Titles
                      example: 'Add,Edit,View,Delete'
                    OwnerEmail:
                      type: string
                      description: Email ID of the owner of the study
                      example: publish@lifedatacorp.com
                    OwnerID:
                      type: integer
                      description: User ID of the owner of the study
                      example: 123
              example:
                - StudyID: 123
                  StudyTitle: Welcome to LifeData
                  ActionIDs: '1,2,4,5'
                  ActionTitles: 'Add,Edit,View,Delete'
                  OwnerEmail: publish@lifedatacorp.com
                  OwnerID: 123
  /participant/changePassword:
    post:
      tags:
        - Mobile Participant
      summary: Change Participant Password
      description: API to change the password of a mobile participant.
      operationId: post-participant-changepassword
      parameters:
