              type: object
              properties:
                InvitationID:
                  type: integer
                  example: 1
            example:
              InvitationID: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  CanUpdate:
                    type: integer
                    example: 1
              example:
                CanUpdate: 1
  /team/deactivate:
    put:
      tags:
        - Team Management
      summary: Deactivate a team member
      description: Deactivate a team member
      operationId: put-team-deactivate
      parameters:
        - name: Authorization
