              type: object
              properties:
                TeamMemberID:
                  type: integer
                  example: 1
            example:
              TeamMemberID: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    StudyID:
                      type: integer
                      example: 1
                    StudyTitle:
                      type: string
                      example: Tim David
                    AllocatedParticipantCount:
                      type: integer
                      example: 50
