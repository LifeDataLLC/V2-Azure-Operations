            schema:
              type: object
              properties:
                UserEmail:
                  type: string
                  description: Participant email ID
                  example: tanvir@lifedatacorp.com
                NewPassword:
                  type: string
                  description: New password to be set for the participant
                  example: qweQWE456@@
            example:
              UserEmail: tanvir@lifedatacorp.com
              NewPassword: qweQWE456@@
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResponse'
              example:
                PasswordChanged: '1'
  /resource/request:
    post:
      tags:
        - Resource
      summary: Request Resources
      description: This API will send email to LifeData sales team about the request
      operationId: post-resource-request
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing requested resource information
        content:
          application/json:
            schema:
              type: object
              properties:
                RequestDetail:
                  type: array
                  items:
                    unrecognizedKeywords:
                      unrecognizedKeywords:
                        Type:
                          type: integer
                          example: '1'
                          description: resource type
                        Amount:
                          type: integer
                          example: '1'
                          description: requested amount
            example:
              RequestDetail:
                - { }
      responses:
        '201':
          description: Created
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
  /resource/allStudyResource:
    get:
      tags:
        - Resource
