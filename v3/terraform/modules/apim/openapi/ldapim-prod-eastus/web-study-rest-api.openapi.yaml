            example: '0'
          ScheduleTiming:
            type: string
            description: "&nbsp;&nbsp;[ScheduleToStart] [tinyint]<br>\n&nbsp;&nbsp;&nbsp;1 = On a specific day of the study<br>\n&nbsp;&nbsp;&nbsp;2 = On a specific day of the week<br>\n&nbsp;&nbsp;&nbsp;3 = On a specific day of the month<br>\n&nbsp;&nbsp;&nbsp;4 = On a specific date<br>\n&nbsp;&nbsp;[StartOn] [tinyint]<br>\n&nbsp;&nbsp;&nbsp;For On a specific day of the week value will be as below<br>\n&nbsp;&nbsp;&nbsp;&nbsp;1 = Monday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;2 = Tuesday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;3 = Wednesday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;4 = Thursday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;5 = Friday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;6 = Saturday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;7 = Sunday<br>\n&nbsp;&nbsp;&nbsp;For On a specific day of the month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;0 = Day<br>\n&nbsp;&nbsp;&nbsp;&nbsp;1 = First<br>\n&nbsp;&nbsp;&nbsp;&nbsp;2 = Second<br>\n&nbsp;&nbsp;&nbsp;&nbsp;3 = Third<br>\n&nbsp;&nbsp;&nbsp;&nbsp;4 = Fourth<br>\n&nbsp;&nbsp;&nbsp;&nbsp;5 = Last<br>\n&nbsp;&nbsp;[StartOnDate] [date]<br>\n&nbsp;&nbsp;&nbsp;This will be configured for \"On a specific date\" only<br>\n&nbsp;&nbsp;[StartOnDay] [tinyint]<br>\n&nbsp;&nbsp;&nbsp;This will be configured for \"On a specific day of the month\" only<br>\n&nbsp;&nbsp;&nbsp;&nbsp;0 = Weekday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;-1 = Weekend<br>\n&nbsp;&nbsp;&nbsp;&nbsp;1 = Monday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;2 = Tuesday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;3 = Wednesday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;4 = Thursday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;5 = Friday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;6 = Saturday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;7 = Sunday<br>\n&nbsp;&nbsp;[ScheduleToEnd] [tinyint]<br>\n&nbsp;&nbsp;&nbsp;1 = On a specific day of the study<br>\n&nbsp;&nbsp;&nbsp;2 = On a specific day of the week<br>\n&nbsp;&nbsp;&nbsp;3 = On a specific day of the month<br>\n&nbsp;&nbsp;&nbsp;4 = On a specific date<br>\n&nbsp;&nbsp;[EndOn] [tinyint]<br>\n&nbsp;&nbsp;&nbsp;&nbsp;For On a specific day of the week value will be as below<br>\n&nbsp;&nbsp;&nbsp;&nbsp;1 = Monday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;2 = Tuesday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;3 = Wednesday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;4 = Thursday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;5 = Friday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;6 = Saturday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;7 = Sunday<br>\n&nbsp;&nbsp;&nbsp;For On a specific day of the month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;0 = Day<br>\n&nbsp;&nbsp;&nbsp;&nbsp;1 = First<br>\n&nbsp;&nbsp;&nbsp;&nbsp;2 = Second<br>\n&nbsp;&nbsp;&nbsp;&nbsp;3 = Third<br>\n&nbsp;&nbsp;&nbsp;&nbsp;4 = Fourth<br>\n&nbsp;&nbsp;&nbsp;&nbsp;5 = Last<br>\n&nbsp;&nbsp;[EndOnDate] [date]<br>\n&nbsp;&nbsp;&nbsp;This will be configured for \"On a specific date\" only<br>\n&nbsp;&nbsp;[EndOnDay] [tinyint]<br>\n&nbsp;&nbsp;&nbsp;This will be configured for \"On a specific day of the month\" only<br>\n&nbsp;&nbsp;&nbsp;&nbsp;0 = Weekday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;-1 = Weekend<br>\n&nbsp;&nbsp;&nbsp;&nbsp;1 = Monday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;2 = Tuesday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;3 = Wednesday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;4 = Thursday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;5 = Friday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;6 = Saturday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;7 = Sunday\n<br><u>Example:</u><br>\n<u>Regular & Standard Trigger Schedule</u><br>\n&nbsp;&nbsp;Condition 1: StartImmediately = 1, StopWithStudyEnd = 1<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Value=''<br>\n&nbsp;&nbsp;Condition 2: StartImmediately = 0, StopWithStudyEnd = 1<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 2.1: ScheduleToStart = 1    -- On a specific day of the study<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":1, \"StartOn\":2}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 2.2: ScheduleToStart = 2    -- On a specific day of the week\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":1, \"StartOn\":6}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 2.3: ScheduleToStart = 3    -- On a specific day of the month\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":1, \"StartOn\":21}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 2.4: ScheduleToStart = 4    -- On a specific date<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":1, \"StartOnDate\":'2023-12-15'}<br>\n\n&nbsp;&nbsp;Condition 3: StartImmediately = 1, StopWithStudyEnd = 0<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 3.1: ScheduleToEnd = 1    -- On a specific day of the study<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToEnd\":1, \"EndOn\":2}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 3.2: ScheduleToEnd = 2    -- On a specific day of the week\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToEnd\":2, \"EndOn\":6}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 3.3: ScheduleToEnd = 3    -- On a specific day of the month\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToEnd\":3, \"EndOn\":21}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 3.4: ScheduleToEnd = 4    -- On a specific date<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToEnd\":4, \"EndOnDate\":'2023-12-15'}<br>\n\n&nbsp;&nbsp;Condition 4: StartImmediately = 0, StopWithStudyEnd = 0<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.1:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 1    -- On a specific day of the study<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 1    -- On a specific day of the study<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":1, \"StartOn\":2, \"ScheduleToEnd\":1, \"EndOn\":5}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.2:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 1    -- On a specific day of the study<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 2    -- On a specific day of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":1, \"StartOn\":2, \"ScheduleToEnd\":2, \"EndOn\":5}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.3:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 1    -- On a specific day of the study<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 3    -- On a specific day of the month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":1, \"StartOn\":2, \"ScheduleToEnd\":3, \"EndOn\":2}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.4:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 1    -- On a specific day of the study<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 4    -- On a specific date<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":1, \"StartOn\":2, \"ScheduleToEnd\":4, \"EndOnDate\":'2023-12-25'}<br>\n\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.5:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 2    -- On a specific day of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 1    -- On a specific day of the study<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":2, \"StartOn\":2, \"ScheduleToEnd\":1, \"EndOn\":5}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.6:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 2    -- On a specific day of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 2    -- On a specific day of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":2, \"StartOn\":2, \"ScheduleToEnd\":2, \"EndOn\":5}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.7:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 2    -- On a specific day of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 3    -- On a specific day of the month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":2, \"StartOn\":2, \"ScheduleToEnd\":3, \"EndOn\":2}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.8:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 2    -- On a specific day of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 4    -- On a specific date<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":2, \"StartOn\":2, \"ScheduleToEnd\":4, \"EndOnDate\":'2023-12-25'}<br>\n\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.9:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 3    -- On a specific day of the month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 1    -- On a specific day of the study<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":3, \"StartOn\":2, \"ScheduleToEnd\":1, \"EndOn\":5}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.10:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 3    -- On a specific day of the month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 2    -- On a specific day of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":3, \"StartOn\":2, \"ScheduleToEnd\":2, \"EndOn\":5}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.11:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 3    -- On a specific day of the month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 3    -- On a specific day of the month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":3, \"StartOn\":2, \"ScheduleToEnd\":3, \"EndOn\":2}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.12:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 3    -- On a specific day of the month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 4    -- On a specific date<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":3, \"StartOn\":2, \"ScheduleToEnd\":4, \"EndOnDate\":'2023-12-25'}<br>\n\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.13:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 4    -- On a specific date<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 1    -- On a specific day of the study<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":4, \"StartOnDate\":'2023-12-15', \"ScheduleToEnd\":1, \"EndOn\":5}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.14:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 4    -- On a specific date<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 2    -- On a specific day of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":4, \"StartOnDate\":'2023-12-15', \"ScheduleToEnd\":2, \"EndOn\":5}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.15:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 4    -- On a specific date<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 3    -- On a specific day of the month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":4, \"StartOnDate\":'2023-12-15', \"ScheduleToEnd\":3, \"EndOn\":2}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 4.16:<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToStart = 4    -- On a specific date<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;ScheduleToEnd = 4    -- On a specific date<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Value</b>={\"ScheduleToStart\":4, \"StartOnDate\":'2023-12-15', \"ScheduleToEnd\":4, \"EndOnDate\":'2023-12-25'}<br>\n<u>Timed Trigger Schedule</u><br>\n&nbsp;&nbsp;Value</b>={}<br>\n"
            example: '{"ScheduleToStart": 1, "StartOn": 1, "ScheduleToEnd": 1, "EndOn": 5}'
          NotificationTiming:
            type: string
            description: "<u>Notification Timing Data for Random Regular and Standard Trigger Schedule</u><br>\n&nbsp;&nbsp;[Sample] [tinyint]<br>\n&nbsp;&nbsp;&nbsp;&nbsp;1 = Every Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;2 = Selected Weeks of the Month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;3 = Randomized Weeks with in a Month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;4 = Exact Dates<br>\n&nbsp;&nbsp;[SampleValue] [varchar]<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Every Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;0<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Selected Weeks of the Month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1 = First<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;2 = Second<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;3 = Third<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;4 = Fourth<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;5 = Last<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Randomized Weeks with in a Month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1 to 4<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Exact Dates<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Date, Start Time, End Time, Same Day = 0 OR 1<br>\n&nbsp;&nbsp;[WhatDaysForSchedule] [tinyint]<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Every Week OR Selected Weeks of the Month OR Randomized Weeks with in a Month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1 = Everyday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;2 = Selected Days of Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;3 = Randomized days of the week<br>\n&nbsp;&nbsp;[WhatDaysForScheduleValue] [varchar](15)<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Everyday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;0<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Selected Days of Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1 = Monday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;2 = Tuesday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;3 = Wednesday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;4 = Thursday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;5 = Friday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;6 = Saturday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;7 = Sunday<br>\n&nbsp;&nbsp;Randomized days of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;1 to 6<br>\n&nbsp;&nbsp;[StartTime] [time]<br>\n&nbsp;&nbsp;[EndTime] [time]<br>\n&nbsp;&nbsp;[NumberOfNotification] [tinyint]<br>\n&nbsp;&nbsp;[TimeBetweenNotification] [smallint]<br>\n<br><u>Example:</u><br>\n&nbsp;&nbsp;Condition 1: Sample = 1             -- Every Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 1.1: WhatDaysForSchedule = 1             -- Everyday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":1, \"WhatDaysForSchedule\":1, \"NotificationTimes\":[{\"StartTime\":'08:00', \"EndTime\":'10:00', \"NumberOfNotification\":2, \"TimeBetweenNotification\":20}, {\"StartTime\":'11:00', \"EndTime\":'13:00', \"NumberOfNotification\":3, \"TimeBetweenNotification\":15}]}<br>\n\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 1.2: WhatDaysForSchedule = 2             -- Selected Days of Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":1, \"WhatDaysForSchedule\":2, \"WhatDaysForScheduleValue\":'2,5', \"NotificationTimes\":[{\"StartTime\":'18:00', \"EndTime\":'10:00', \"NumberOfNotification\":2, \"TimeBetweenNotification\":20}, {\"StartTime\":'14:00', \"EndTime\":'17:00', \"NumberOfNotification\":3, \"TimeBetweenNotification\":15}]}<br>\n\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 1.3: WhatDaysForSchedule = 3             -- Randomized days of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":1, \"WhatDaysForSchedule\":3, \"WhatDaysForScheduleValue\":'3', \"NotificationTimes\":[{\"StartTime\":'18:00', \"EndTime\":'10:00', \"NumberOfNotification\":2, \"TimeBetweenNotification\":20}, {\"StartTime\":'14:00', \"EndTime\":'17:00', \"NumberOfNotification\":3, \"TimeBetweenNotification\":15}]}<br>\n\n&nbsp;&nbsp;Condition 2: Sample = 2             -- Selected Weeks of the Month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 2.1: WhatDaysForSchedule = 1             -- Everyday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":2, \"SampleValue\":'2,4', \"WhatDaysForSchedule\":1, \"NotificationTimes\":[{\"StartTime\":'18:00', \"EndTime\":'10:00', \"NumberOfNotification\":2, \"TimeBetweenNotification\":20}, {\"StartTime\":'14:00', \"EndTime\":'17:00', \"NumberOfNotification\":3, \"TimeBetweenNotification\":15}]}<br>\n\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 2.2: WhatDaysForSchedule = 2             -- Selected Days of Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":2, \"SampleValue\":'2,4', \"WhatDaysForSchedule\":2, \"WhatDaysForScheduleValue\":'2,5', \"NotificationTimes\":[{\"StartTime\":'18:00', \"EndTime\":'10:00', \"NumberOfNotification\":2, \"TimeBetweenNotification\":20}, {\"StartTime\":'14:00', \"EndTime\":'17:00', \"NumberOfNotification\":3, \"TimeBetweenNotification\":15}]}<br>\n\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 2.3: WhatDaysForSchedule = 3             -- Randomized days of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":2, \"SampleValue\":'2,4', \"WhatDaysForSchedule\":3, \"WhatDaysForScheduleValue\":'3', \"NotificationTimes\":[{\"StartTime\":'18:00', \"EndTime\":'10:00', \"NumberOfNotification\":2, \"TimeBetweenNotification\":20}, {\"StartTime\":'14:00', \"EndTime\":'17:00', \"NumberOfNotification\":3, \"TimeBetweenNotification\":15}]}<br>\n\n&nbsp;&nbsp;Condition 3: Sample = 3             -- Randomized Weeks with in a Month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 3.1: WhatDaysForSchedule = 1             -- Everyday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":3, \"SampleValue\":'2', \"WhatDaysForSchedule\":1, \"NotificationTimes\":[{\"StartTime\":'18:00', \"EndTime\":'10:00', \"NumberOfNotification\":2, \"TimeBetweenNotification\":20}, {\"StartTime\":'14:00', \"EndTime\":'17:00', \"NumberOfNotification\":3, \"TimeBetweenNotification\":15}]}<br>\n\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 3.2: WhatDaysForSchedule = 2             -- Selected Days of Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":3, \"SampleValue\":'2', \"WhatDaysForSchedule\":2, \"WhatDaysForScheduleValue\":'2,5', \"NotificationTimes\":[{\"StartTime\":'18:00', \"EndTime\":'10:00', \"NumberOfNotification\":2, \"TimeBetweenNotification\":20}, {\"StartTime\":'14:00', \"EndTime\":'17:00', \"NumberOfNotification\":3, \"TimeBetweenNotification\":15}]}<br>\n\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 3.3: WhatDaysForSchedule = 3             -- Randomized days of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":3, \"SampleValue\":'2', \"WhatDaysForSchedule\":3, \"WhatDaysForScheduleValue\":'3', \"NotificationTimes\":[{\"StartTime\":'18:00', \"EndTime\":'10:00', \"NumberOfNotification\":2, \"TimeBetweenNotification\":20}, {\"StartTime\":'14:00', \"EndTime\":'17:00', \"NumberOfNotification\":3, \"TimeBetweenNotification\":15}]}<br>\n\n&nbsp;&nbsp;Condition 4: Sample = 4             -- Exact Dates<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":4, \"SampleValue\":'2023-12-15', \"NotificationTimes\":[{\"StartTime\":'18:00', \"EndTime\":'10:00', \"NumberOfNotification\":2, \"TimeBetweenNotification\":20}, {\"StartTime\":'14:00', \"EndTime\":'17:00', \"NumberOfNotification\":3, \"TimeBetweenNotification\":15}]}<br>\n<u>Notification Timing Data for Fixed Regular and Standard Trigger Schedule</u><br>\n&nbsp;&nbsp;[Sample] [tinyint]<br>\n&nbsp;&nbsp;&nbsp;&nbsp;1 = Every Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;2 = Selected Weeks of the Month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;3 = Randomized Weeks with in a Month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;4 = Exact Dates<br>\n&nbsp;&nbsp;[SampleValue] [varchar]<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Every Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;0<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Selected Weeks of the Month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1 = First<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;2 = Second<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;3 = Third<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;4 = Fourth<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;5 = Last<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Randomized Weeks with in a Month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1 to 4<br>\n&nbsp;&nbsp;Exact Dates<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Date, Notification Time<br>\n&nbsp;&nbsp;[WhatDaysForSchedule] [tinyint]<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Every Week OR Selected Weeks of the Month OR Randomized Weeks with in a Month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1 = Everyday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;2 = Selected Days of Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;3 = Randomized days of the week<br>\n&nbsp;&nbsp;[WhatDaysForScheduleValue] [varchar](15)<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Everyday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;0<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Selected Days of Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1 = Monday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;2 = Tuesday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;3 = Wednesday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;4 = Thursday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;5 = Friday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;6 = Saturday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;7 = Sunday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Randomized days of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1 to 6<br>\n&nbsp;&nbsp;[NotificationTime] [time]<br>\n<br><u>Example:</u><br>\n&nbsp;&nbsp;Condition 1: Sample = 1             -- Every Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 1.1: WhatDaysForSchedule = 1             -- Everyday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":1, \"WhatDaysForSchedule\":1, \"NotificationTimes\":[{\"Time\":'10:00'},{\"Time\":'15:00'}]}<br>  \n&nbsp;&nbsp;&nbsp;&nbsp;Condition 1.2: WhatDaysForSchedule = 2             -- Selected Days of Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":1, \"WhatDaysForSchedule\":2, \"WhatDaysForScheduleValue\":'2,5', \"NotificationTimes\":[{\"Time\":'10:00'},{\"Time\":'15:00'}]}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 1.3: WhatDaysForSchedule = 3             -- Randomized days of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":1, \"WhatDaysForSchedule\":3, \"WhatDaysForScheduleValue\":'3', \"NotificationTimes\":[{\"Time\":'10:00'},{\"Time\":'15:00'}]}<br>\n\n&nbsp;&nbsp;Condition 2: Sample = 2             -- Selected Weeks of the Month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 2.1: WhatDaysForSchedule = 1             -- Everyday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":2, \"SampleValue\":'2,4', \"WhatDaysForSchedule\":1, \"NotificationTimes\":[{\"Time\":'10:00'},{\"Time\":'15:00'}]}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 2.2: WhatDaysForSchedule = 2             -- Selected Days of Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":2, \"SampleValue\":'2,4', \"WhatDaysForSchedule\":2, \"WhatDaysForScheduleValue\":'2,5', \"NotificationTimes\":[{\"Time\":'10:00'},{\"Time\":'15:00'}]}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 2.3: WhatDaysForSchedule = 3             -- Randomized days of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":2, \"SampleValue\":'2,4', \"WhatDaysForSchedule\":3, \"WhatDaysForScheduleValue\":'3', \"NotificationTimes\":[{\"Time\":'10:00'},{\"Time\":'15:00'}]}<br>\n\n&nbsp;&nbsp;Condition 3: Sample = 3             -- Randomized Weeks with in a Month<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 3.1: WhatDaysForSchedule = 1             -- Everyday<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":3, \"SampleValue\":'2', \"WhatDaysForSchedule\":1, \"NotificationTimes\":[{\"Time\":'10:00'},{\"Time\":'15:00'}]}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 3.2: WhatDaysForSchedule = 2             -- Selected Days of Week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":3, \"SampleValue\":'2', \"WhatDaysForSchedule\":2, \"WhatDaysForScheduleValue\":'2,5', \"NotificationTimes\":[{\"Time\":'10:00'},{\"Time\":'15:00'}]}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Condition 3.3: WhatDaysForSchedule = 3             -- Randomized days of the week<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":3, \"SampleValue\":'2', \"WhatDaysForSchedule\":3, \"WhatDaysForScheduleValue\":'3', \"NotificationTimes\":[{\"Time\":'10:00'},{\"Time\":'15:00'}]}<br>\n\n&nbsp;&nbsp;Condition 4: Sample = 4             -- Exact Dates<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Value={\"Sample\":4, \"SampleValue\":'2023-12-15', \"NotificationTimes\":[{\"Time\":'10:00'},{\"Time\":'15:00'}]}<br>\n<u>Notification Timing Data for Timed Trigger Random Schedule</u><br>\n<br><u>Example:</u><br>\n&nbsp;&nbsp;Value={\"NotificationTimes\":[{\"StartTime\":'12345', \"EndTime\":'23456', \"NumberOfNotification\":2, \"TimeBetweenNotification\":20}, {\"StartTime\":'34567', \"EndTime\":'45678', \"NumberOfNotification\":3, \"TimeBetweenNotification\":30}]}<br>\n<u>Notification Timing Data for Timed Trigger Fixed Schedule</u><br>\n&nbsp;&nbsp;Value={\"NotificationTimes\":[{\"Time\":'12345'}, {\"Time\":'34567'}]}<br>\n"
            example:
              Sample: 1
              WhatDaysForSchedule: 1
