                          example: 3
                        LogicStatementID:
                          type: integer
                          example: 4
                  LogicStatementSessionMapping:
                    type: array
                    items:
                      type: object
                      properties:
                        SessionID:
                          type: integer
                          example: 3
                        LogicStatementID:
                          type: integer
                          example: 4
              example:
                AlertConfigurations:
                  - AlertName: Test Alert
                    ConditionOn: 1
                    NotificationType: 1
                    TimingInfo: '{"TimingType":3,SpecificTime: 10:25}'
                    IsActive: 1
                LogicDetail:
                  - StudyAlertID: 1
                    LogicID: 1
                    LogicType: 1
                    LogicFlag: '1'
                LogicConditionDetail:
                  - LogicID: 1
