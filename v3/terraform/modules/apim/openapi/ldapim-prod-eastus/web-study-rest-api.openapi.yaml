                          type: string
                          description: "&nbsp;&nbsp;[TimingType] [tinyint]<br>\n&nbsp;&nbsp;&nbsp;&nbsp;1 = Immediately<br>\n&nbsp;&nbsp;&nbsp;&nbsp;2 = after a specified period of time has elapsed<br>\n&nbsp;&nbsp;&nbsp;&nbsp;3 = at a specified time each day<br>\n&nbsp;&nbsp;[SpecificTimePeriod] [integer]<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Example: 123<br>\n&nbsp;&nbsp;[SpecificTime] [time]<br>\n&nbsp;&nbsp;&nbsp;&nbsp;Example: 10:25<br>\n"
                          example: '{"TimingType":3,SpecificTime: 10:25}'
                        IsActive:
                          enum:
                            - 0
                            - 1
                          type: integer
                          description: "&nbsp;&nbsp;0 = No<br>\n&nbsp;&nbsp;1 = Yes<br>\n"
                          example: 1
                  LogicDetail:
                    type: array
                    items:
                      type: object
                      properties:
                        StudyAlertID:
                          type: integer
                          example: 1
                        LogicID:
                          type: integer
                          example: 1
                        LogicType:
                          type: integer
                          description: '1 = Always, 2 = Based on Condition'
                          example: 1
                        LogicFlag:
                          type: boolean
                          description: '0 = AND, 1 = OR'
                          example: '1'
                  LogicConditionDetail:
                    type: array
                    items:
                      type: object
                      properties:
                        LogicID:
                          type: integer
                          example: 1
                        LogicConditionID:
                          type: integer
                          example: 1
                        ConditionLogicFlag:
                          type: boolean
                          description: '0 = AND, 1 = OR'
                          example: '1'
                  ConditionStatementMapping:
                    type: array
                    items:
                      type: object
                      properties:
                        LogicID:
                          type: integer
                          example: 1
                        LogicConditionID:
                          type: integer
                          example: 1
                        LogicStatementID:
                          type: integer
                          example: 1
                  LogicStatementDetail:
                    type: array
                    items:
                      type: object
                      properties:
                        LogicStatementID:
                          type: integer
                          example: 1
                        ConditionOn:
                          enum:
                            - 1
                            - 2
                            - 3
                            - 4
                            - 5
                            - 6
                          type: integer
                          description: "&nbsp;&nbsp;1 = Question<br>\n&nbsp;&nbsp;2 = Score<br>\n&nbsp;&nbsp;3 = Session<br>\n&nbsp;&nbsp;4 = Probability<br>\n&nbsp;&nbsp;5 = NIS Response Rate<br>\n&nbsp;&nbsp;6 = Check-In Session Count\n"
                          example: 1
                        StatementLogic:
                          enum:
                            - 1
                            - 2
                            - 3
                            - 4
                            - 5
                            - 6
                            - 7
                            - 8
                          type: integer
                          description: "&nbsp;&nbsp;1 = Is completed / Responded (applies to all Question types)<br>\n&nbsp;&nbsp;2 = Is equal to (Also applies to text entry)<br>\n&nbsp;&nbsp;3 = Is not equal to (Also applies to text entry)<br>\n&nbsp;&nbsp;4 = Is greater than<br>\n&nbsp;&nbsp;5 = Is less than<br>\n&nbsp;&nbsp;6 = Is greater than or equal to<br>\n&nbsp;&nbsp;7 = Is less than or equal to<br>\n&nbsp;&nbsp;8 = Is Complete<br>\n"
                          example: 1
                        StatementValue:
                          type: string
                          example: '4'
                        ResponseSelection:
                          enum:
                            - 0
                            - 1
                            - 2
                            - 3
                          type: integer
                          description: "&nbsp;&nbsp;0 = Last<br>\n&nbsp;&nbsp;2 = Average Specific Response<br>\n&nbsp;&nbsp;3 = Average All<br>\n"
                          example: 0
                        NumberOfSessionInstance:
                          type: integer
                          example: 3
                  LogicStatementQuestionMapping:
                    type: array
                    items:
                      type: object
                      properties:
                        QuestionID:
                          type: integer
                          example: 3
                        LogicStatementID:
                          type: integer
                          example: 4
