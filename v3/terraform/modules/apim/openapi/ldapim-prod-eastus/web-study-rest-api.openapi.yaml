      tags:
        - Study
      summary: Publish the Study with StudyID
      description: This will publish the study identified by the provided StudyID
      operationId: put-studies-studyid-publish-studyversion-studyversion
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: StudyVersion
          in: query
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing the Study Publish information
        content:
          application/json:
            schema:
              type: object
              properties:
                ParticipantEnrollmentType:
                  type: integer
                  description: "&nbsp;&nbsp;1 = Input Participants into a Study Participant List<br>\n&nbsp;&nbsp;2 = Allow Participants to enroll through App and be automatically add to List\n"
                  example: 1
                StudyDistributionMode:
                  enum:
                    - 1
                    - 2
                    - 3
                  type: integer
                  description: "&nbsp;&nbsp;1 = Searchable in mobile application<br>\n&nbsp;&nbsp;2 = Downloadable by link only<br>\n&nbsp;&nbsp;3 = Both\n"
                  example: 1
                RequireAccessCodeFlag:
                  enum:
                    - '0'
                    - '1'
                  type: boolean
                  description: '1 = Yes, 0 = No'
                  example: '0'
                SecretCode:
                  type: string
                  example: TestCode
                AvailabilityStartDT:
                  type: string
                  description: When the study will be available to download
                  example: '2024-06-27T10:11:12Z'
                AvailabilityEndDT:
                  type: string
                  description: After which time study will be unavailable to download
                  example: '2024-06-27T10:11:12Z'
                ReviewOnly:
                  enum:
                    - '0'
                    - '1'
                  type: boolean
                  example: '1'
                TimeOffSet:
                  type: string
                  description: Time offset format +/-HH:MM
                  example: +06:00
            example:
              ParticipantEnrollmentType: 1
              StudyDistributionMode: 1
              RequireAccessCodeFlag: '0'
              SecretCode: TestCode
              AvailabilityStartDT: '2024-06-27T10:11:12.0000000+00:00'
              AvailabilityEndDT: '2024-06-27T10:11:12.0000000+00:00'
