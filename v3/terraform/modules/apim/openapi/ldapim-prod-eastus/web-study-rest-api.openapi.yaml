                              - 1
                              - 2
                              - 3
                              - 4
                              - 5
                            type: integer
                            description: "&nbsp;&nbsp;0 = Last<br>\n&nbsp;&nbsp;1 = First<br>\n&nbsp;&nbsp;2 = Average Specific Response<br>\n&nbsp;&nbsp;3 = Average All<br>\n&nbsp;&nbsp;4 = Current Response<br>\n&nbsp;&nbsp;5 = Prior Response\n"
