                          enum:
                            - 1
                            - 2
                            - 3
                            - 4
                            - 5
                            - 6
                          type: integer
                          description: "&nbsp;&nbsp;1 = Question<br>\n&nbsp;&nbsp;2 = Score<br>\n&nbsp;&nbsp;3 = Session<br>\n&nbsp;&nbsp;4 = Probability<br>\n&nbsp;&nbsp;5 = Response Rate<br>\n&nbsp;&nbsp;6 = Session Count<br>\n"
                          example: 1
                        NotificationType:
                          enum:
                            - 1
                            - 2
                            - 3
                            - 4
                          type: integer
                          description: "&nbsp;&nbsp;1 = System Pop-up<br>\n&nbsp;&nbsp;2 = System Pop-up + email<br>\n&nbsp;&nbsp;3 = System Pop-up + sms<br>\n&nbsp;&nbsp;4 = System Pop-up + email + sms<br>\n"
                          example: 1
