openapi: 3.0.1
info:
  title: Web Study REST API
  description: This API allow web application users to interact with the LIFEDATA study service.
  termsOfService: https://www.lifedatacorp.com/lifedata-terms-of-use/
  contact:
    name: Lifedata Corp
    url: https://www.lifedatacorp.com/
    email: info@lifedatacorp.com
  license:
    name: Lifedata license
    url: https://www.lifedatacorp.com/license
  version: '1.0'
servers:
  - url: https://api.lifedatacorp.com/web
paths:
  /common/staticData:
    get:
      tags:
        - Common
      summary: Get All Static Data
      description: This will return all static data
      operationId: get-common-staticdata
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  StaticDataVO:
                    type: object
                    properties:
                      ApplicationCurrentVersion:
                        type: string
                        example: 1.0.0
                  TypeVOs:
                    type: array
                    items:
                      type: object
                      properties:
                        TypeTableID:
                          type: integer
                          example: 1
                        TypeFor:
                          type: string
                          example: LifeDataUser
                        Name:
                          type: string
                          example: UserType
                        DefaultValue:
                          type: integer
                          example: 1
                        TooltipText:
                          type: string
                          example: Subscription User
                        Description:
                          type: string
                          example: Subscription User
                  TypeLookUpVOs:
                    type: array
                    items:
                      type: object
                      properties:
                        TypeLookUpID:
                          type: integer
                          example: 1
                        TypeTableID:
                          type: integer
                          example: 'true'
                        Value:
                          type: integer
                          example: 'true'
                        Name:
                          type: string
                          example: '1'
                        Description:
                          type: string
                          example: Test Block
                  TooltipVOs:
                    type: array
                    items:
                      type: object
                      properties:
                        TooltipID:
                          type: integer
                          example: 1
                        Label:
                          type: string
                          example: Name
                        TooltipText:
                          type: string
                          example: Study Name
                        ReferencePage:
                          type: string
                          example: Study Configuration
                  RoleActionMappingVOs:
                    type: array
                    items:
                      type: object
                      properties:
                        RoleID:
                          type: integer
                          description: Organization Admin
                          example: 6
                        ObjectID:
                          enum:
                            - 1
                            - 2
                            - 3
                            - 4
                            - 5
                          type: integer
                          description: "&nbsp;&nbsp;1 = SUBSCRIPTION<br>\n&nbsp;&nbsp;2 = ORGANIZATION<br>\n&nbsp;&nbsp;3 = STUDY<br>\n&nbsp;&nbsp;4 = DASHBOARD<br>\n&nbsp;&nbsp;5 = UserGroup\n"
                          example: 2
                        ActionID:
                          type: integer
                          description: ID of the action
                          example: 42
                        RoleName:
                          type: string
                          description: name of the role
                          example: Organization Admin
                        Description:
                          type: string
                          description: detail about the role
                          example: organization admin
                        RoleType:
                          enum:
                            - 1
                            - 2
                            - 3
                          type: integer
                          description: "&nbsp;&nbsp;1 = Subscription Assigned<br>\n&nbsp;&nbsp;2 = Application Assigned<br>\n&nbsp;&nbsp;3 = User Assigned\n"
                          example: 2
                        ActionTitle:
                          type: string
                          description: Title of the action
                          example: Download among Sub Organization
                        ActionDetail:
                          type: string
                          description: Title of the action
                          example: Download among Sub Organization
              example:
                StaticDataVO:
                  ApplicationCurrentVersion: 1.0.0
                TypeVOs:
                  - TypeTableID: 1
                    TypeFor: LifeDataUser
                    Name: UserType
                    DefaultValue: 1
                    TooltipText: Subscription User
                    Description: Subscription User
                TypeLookUpVOs:
                  - TypeLookUpID: 1
                    TypeTableID: 'true'
                    Value: 'true'
                    Name: '1'
                    Description: Test Block
                TooltipVOs:
                  - TooltipID: 1
                    Label: Name
                    TooltipText: Study Name
                    ReferencePage: Study Configuration
                RoleActionMappingVOs:
                  - RoleID: 6
                    ObjectID: 2
                    ActionID: 42
                    RoleName: Organization Admin
                    Description: organization admin
                    RoleType: 2
                    ActionTitle: Download among Sub Organization
                    ActionDetail: Download among Sub Organization
  /common/roleObjectAction:
    get:
      tags:
        - Common
      summary: Get Role object action mapping data
      description: This will return all static data
      operationId: get-common-roleobjectaction
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  RoleData:
                    $ref: '#/components/schemas/RoleData'
                  RoleEligibility:
                    type: array
                    items:
                      type: object
                      properties:
                        RoleAssignFor:
                          type: integer
                          example: 1
                        RoleAssignEligibleTo:
                          type: integer
                          example: 2
                  ObjectData:
                    type: array
                    items:
                      type: object
                      properties:
                        ObjectID:
                          type: integer
                          example: 2
                        ObjectTableName:
                          type: string
                          example: Study
                        ObjectDetail:
                          type: string
                          example: Study component
                  ActionData:
                    type: array
                    items:
                      type: object
                      properties:
                        ActionID:
                          type: integer
                          example: 1
                        ActionTitle:
                          type: string
                          example: Study add
                        ActionDetail:
                          type: string
                          example: Study add
                  RoleObjectActionMapping:
                    type: array
                    items:
                      type: object
                      properties:
                        RoleID:
                          type: integer
                          example: 1
                        ObjectID:
                          type: integer
                          example: 1
                        ActionID:
                          type: integer
                          example: 1
              example:
                RoleData:
                  - RoleID: 1
                    RoleName: Researcher
                    Description: Researcher can create study
                    RoleType: 1
                RoleEligibility:
                  - RoleAssignFor: 1
                    RoleAssignEligibleTo: 2
                ObjectData:
                  - ObjectID: 2
                    ObjectTableName: Study
                    ObjectDetail: Study component
                ActionData:
                  - ActionID: 1
                    ActionTitle: Study add
                    ActionDetail: Study add
                RoleObjectActionMapping:
                  - RoleID: 1
                    ObjectID: 1
                    ActionID: 1
  /studies:
    get:
      tags:
        - Study
      summary: Get All Studies
      description: This will return all the studies
      operationId: get-studies-limit-limit-page-page
      parameters:
        - name: Limit
          in: query
          required: true
          schema:
            type: integer
        - name: Page
          in: query
          required: true
          schema:
            type: integer
        - name: SearchText
          in: query
          schema:
            type: string
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResult'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/StudyListItem'
              example:
                Total: 40
                Page: 1
                PerPage: 10
                HasNext: true
                HasPrev: false
                results:
                  - StudyID: 1
                    NextVersion: 1
                    FilePath: ''
                    LanguageID: 1
                    StudyTitle: Test Study
                    IsRTL: true
                    OwnerBy: amalesh.debnath@gmail.com
                    CreatedBy: amalesh.debnath@gmail.com
                    PublishedBy: amalesh.debnath@gmail.com
                    CreatedDT: '2024-05-06T10:11:12.0000000+00:00'
                    CompletionDT: '2024-05-06T10:11:12.0000000+00:00'
                    PublishDT: '2024-05-06T10:11:12.0000000+00:00'
                    LastAccessDT: '2024-05-06T10:11:12.0000000+00:00'
                    ActionIDs: '1,3,4,6'
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
    post:
      tags:
        - Study
      summary: Add a Study
      description: This will add a new study
      operationId: post-studies
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing the Study information
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Study'
            example:
              StudyTitle: Name of the study
              LanguageID: 1
      responses:
        '201':
          description: Created
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
    delete:
      tags:
        - Study
      summary: Delete Study in bulk
      description: This will delete study in bulk
      operationId: delete-studies-studyids-studyids
      parameters:
        - name: StudyIDs
          in: query
          required: true
          schema:
            type: string
            description: coma separated study ids
            example: '12,23,45'
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
  /studies/cards:
    get:
      tags:
        - Study
      summary: Get All Studies for landing page
      description: This will return all the studies for landing page
      operationId: get-studies-cards
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    StudyID:
                      type: integer
                      example: 1
                    IsPinned:
                      type: boolean
                      description: '0 = No, 1 = Yes'
                      example: true
                    NextVersion:
                      type: integer
                      example: 1
                    FilePath:
                      type: string
                      example: logo.png
                    LanguageID:
                      type: integer
                      example: 1
                    StudyTitle:
                      type: string
                      example: Test Study
                    Status:
                      enum:
                        - 1
                        - 2
                        - 3
                        - 4
                        - 5
                      type: integer
                      description: '1 = In Progress, 2 = Published, 3 = Unpublished, 4 = Expire, 5 = Complete'
                      example: 1
                    IsRTL:
                      type: boolean
                      description: '0 = No, 1 = Yes'
                      example: true
                    OwnerBy:
                      type: string
                      example: amalesh.debnath@gmail.com
                    CreatedBy:
                      type: string
                      example: amalesh.debnath@gmail.com
                    PublishedBy:
                      type: string
                      example: amalesh.debnath@gmail.com
                    CreatedDT:
                      type: string
                      example: '2024-05-06T10:11:12Z'
                    CompletionDT:
                      type: string
                      example: '2024-05-06T10:11:12Z'
                    PublishDT:
                      type: string
                      example: '2024-05-06T10:11:12Z'
                    LastAccessDT:
                      type: string
                      example: '2024-05-06T10:11:12Z'
                    ActionIDs:
                      type: string
                      description: coma separated Action ID
                      example: '1,3,4,6'
              example:
                - StudyID: 1
                  IsPinned: true
                  NextVersion: 1
                  FilePath: logo.png
                  LanguageID: 1
                  StudyTitle: Test Study
                  Status: 1
                  IsRTL: true
                  OwnerBy: amalesh.debnath@gmail.com
                  CreatedBy: amalesh.debnath@gmail.com
                  PublishedBy: amalesh.debnath@gmail.com
                  CreatedDT: '2024-05-06T10:11:12.0000000+00:00'
                  CompletionDT: '2024-05-06T10:11:12.0000000+00:00'
                  PublishDT: '2024-05-06T10:11:12.0000000+00:00'
                  LastAccessDT: '2024-05-06T10:11:12.0000000+00:00'
                  ActionIDs: '1,3,4,6'
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
  '/studies/{StudyID}':
    get:
      tags:
        - Study
      summary: Get study by ID
      description: Returns the details of the study identified by the provided id
      operationId: get-studies-studyid-studyversion-studyversion
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: StudyVersion
          in: query
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyBasicDetail'
              example:
                LanguageID: 1
                StudyTitle: Test Study
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '404':
          description: Item Not Found
        '500':
          description: Internal Server Error
    put:
      tags:
        - Study
      summary: Update the Study with StudyID
      description: This will update the study identified by the provided StudyID
      operationId: put-studies-studyid-studyversion-studyversion
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: StudyVersion
          in: query
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing the Study information
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Study'
            example:
              StudyTitle: Name of the study
              LanguageID: 1
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
    delete:
      tags:
        - Study
      summary: Delete the Study with StudyID
      description: This will delete the study identified by the provided StudyID
      operationId: delete-studies-studyid
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
  '/studies/{StudyID}/meta-data':
    get:
      tags:
        - Study
      summary: Get study meta data by ID
      description: Returns the meta data of the study
      operationId: get-studies-studyid-meta-data
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  UniqueParticipantCount:
                    type: integer
                    description: The number of unique participant who downloaded the study
                    example: 123
                  ActiveParticipantCount:
                    type: integer
                    description: The number of unique participant who actively participating for this study
                    example: 60
                  TotalDownload:
                    type: integer
                    description: The number of total download of this study
                    example: 150
                  LastAccessDT:
                    type: string
                    description: The time when this study last accessed
                    example: '2024-10-11T12:13:14Z'
                  LastAccessedBy:
                    type: integer
                    description: User Group ID of the user who access the study most recently
                    example: 123
                  LastAccessedEmail:
                    type: string
                    description: Email ID of the user who access the study most recently
                    example: researcher1@lifedatacorp.com
                  LastAccessedUserName:
                    type: string
                    example: Tim David
                  LastEditDT:
                    type: string
                    description: The time when this study last edited
                    example: '2024-10-11T12:13:14Z'
                  LastEditedBy:
                    type: integer
                    description: User Group ID of the user who edit the study most recently
                    example: 123
                  LastEditedEmail:
                    type: string
                    description: Email ID of the user who edit the study most recently
                    example: researcher1@lifedatacorp.com
                  LastEditedUserName:
                    type: string
                    example: Tim David
                  PublishDT:
                    type: string
                    description: The time when this study last published
                    example: '2024-10-11T12:13:14Z'
                  PublishedBy:
                    type: integer
                    description: User Group ID of the user who publish the study most recently
                    example: 123
                  PublisherEmail:
                    type: string
                    description: Email ID of the user who published the study most recently
                    example: researcher1@lifedatacorp.com
                  PublisherUserName:
                    type: string
                    example: Tim David
                  CreateDT:
                    type: string
                    description: The time when this study last created
                    example: '2024-10-11T12:13:14Z'
                  CreatedBy:
                    type: integer
                    description: User Group ID of the user who create the study most recently
                    example: 123
                  CreatorEmail:
                    type: string
                    description: Email ID of the user who create the study most recently
                    example: researcher1@lifedatacorp.com
                  CreatorUserName:
                    type: string
                    example: Tim David
                  OwnedBy:
                    type: integer
                    description: User Group ID of the user who own the study most recently
                    example: 123
                  OwnerEmail:
                    type: string
                    description: Email ID of the user who own the study most recently
                    example: researcher1@lifedatacorp.com
                  OwnerUserName:
                    type: string
                    example: Tim David
                  LastParticipateDT:
                    type: string
                    description: The time when this study last participated
                    example: '2024-10-11T12:13:14Z'
                  ParticipantStartedDT:
                    type: string
                    description: The time when the participation was started
                    example: '2024-10-11T12:13:14Z'
              example:
                UniqueParticipantCount: 123
                ActiveParticipantCount: 60
                TotalDownload: 150
                LastAccessDT: '2024-10-11T12:13:14.0000000+00:00'
                LastAccessedBy: 123
                LastAccessedEmail: researcher1@lifedatacorp.com
                LastAccessedUserName: Tim David
                LastEditDT: '2024-10-11T12:13:14.0000000+00:00'
                LastEditedBy: 123
                LastEditedEmail: researcher1@lifedatacorp.com
                LastEditedUserName: Tim David
                PublishDT: '2024-10-11T12:13:14.0000000+00:00'
                PublishedBy: 123
                PublisherEmail: researcher1@lifedatacorp.com
                PublisherUserName: Tim David
                CreateDT: '2024-10-11T12:13:14.0000000+00:00'
                CreatedBy: 123
                CreatorEmail: researcher1@lifedatacorp.com
                CreatorUserName: Tim David
                OwnedBy: 123
                OwnerEmail: researcher1@lifedatacorp.com
                OwnerUserName: Tim David
                LastParticipateDT: '2024-10-11T12:13:14.0000000+00:00'
                ParticipantStartedDT: '2024-10-11T12:13:14.0000000+00:00'
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '404':
          description: Item Not Found
        '500':
          description: Internal Server Error
  '/studies/{StudyID}/duplicate':
    put:
      tags:
        - Study
      summary: Duplicate a Study
      description: This will duplicate a study
      operationId: put-studies-studyid-duplicate
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing the Study Title
        content:
          application/json:
            schema:
              type: object
              properties:
                StudyTitle:
                  type: string
                  example: Test Study
            example:
              StudyTitle: Test Study
      responses:
        '200':
          description: Created
        '204':
          description: No Content
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
  '/studies/{StudyID}/pin':
    put:
      tags:
        - Study
      summary: Pin a study in landing page
      description: This will pin a study in landing page
      operationId: put-studies-studyid-pin
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '201':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  Updated:
                    enum:
                      - '1'
                      - '0'
                    type: boolean
                    example: '1'
              example:
                Updated: '1'
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
  '/studies/{StudyID}/unpin':
    put:
      tags:
        - Study
      summary: Unpin a study in landing page
      description: This will unpin a study in landing page
      operationId: put-studies-studyid-unpin
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '201':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  Updated:
                    enum:
                      - '1'
                      - '0'
                    type: boolean
                    example: '1'
              example:
                Updated: '1'
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
  '/studies/{StudyID}/permissions':
    get:
      tags:
        - Study
      summary: Get access permissions of a study
      description: Returns the details of all access permissions of a study
      operationId: get-studies-studyid-permissions
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    UserID:
                      type: integer
                      example: 1
                    UserName:
                      type: string
                      example: Tim David
                    EmailID:
                      type: string
                      example: asd@lifedatacorp.com
                    RoleID:
                      type: integer
                      example: 1
                    ProfilePictureFilePath:
                      type: string
                      description: File path to the customer's profile picture
                      example: user-profile/123.png
              example:
                - UserID: 1
                  UserName: Tim David
                  EmailID: asd@lifedatacorp.com
                  RoleID: 1
                  ProfilePictureFilePath: user-profile/123.png
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '404':
          description: Item Not Found
        '500':
          description: Internal Server Error
  '/studies/{StudyID}/add-permissions':
    put:
      tags:
        - Study
      summary: Update access permissions of a study
      description: Update access permissions of a study
      operationId: put-studies-studyid-add-permissions
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing the Block information
        content:
          application/json:
            schema:
              type: object
              properties:
                TeamMemberID:
                  type: integer
                  example: 3
                RoleIDs:
                  type: string
                  example: '12,15'
            example:
              TeamMemberID: 3
              RoleIDs: '2026-12-15'
      responses:
        '204':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    Updated:
                      type: boolean
                      example: '1'
              example:
                - Updated: '1'
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '404':
          description: Item Not Found
        '500':
          description: Internal Server Error
  '/studies/{StudyID}/additional-detail':
    get:
      tags:
        - Study
      summary: Get additional Info about a study
