                              - 3
                              - 4
                              - 5
                              - 6
                            type: integer
                            description: "&nbsp;&nbsp;1 = Question<br>\n&nbsp;&nbsp;2 = Score<br>\n&nbsp;&nbsp;3 = Session<br>\n&nbsp;&nbsp;4 = Probability<br>\n&nbsp;&nbsp;5 = NIS Response Rate<br>\n&nbsp;&nbsp;6 = Check-In Session Count\n"
