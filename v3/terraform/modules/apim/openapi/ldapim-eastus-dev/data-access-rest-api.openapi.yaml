  '/{StudyID}/dashboards/{DashboardID}/reorder':
    put:
      tags:
        - Data Visualization (Dashboard)
      summary: Update Widget Order
      description: This will update the widget order of the Dashboard with DashboardID
      operationId: put-studyid-dashboards-dashboardid-reorder
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: DashboardID
          in: path
          required: true
          schema:
            type: integer
