        description: JSON Object containing the widget order information
        content:
          application/json:
            schema:
              type: object
              properties:
                SortType:
                  enum:
                    - '1'
                    - '0'
                  type: boolean
                  description: "&nbsp;&nbsp;1 = Group<br>\n&nbsp;&nbsp;2 = Ungroup\n"
                  example: '1'
                SortOrder:
                  type: string
                  description: 'This will contain the new order of the widgets in the dashboard | &nbsp;&nbsp;For Group Order value need to be like [{"WidgetGroupID":333, "WidgetIDs":[810,813,804,807,817]},{"WidgetGroupID":335, "WidgetIDs":[802,815,842,805,808,811,845]}]<br> &nbsp;&nbsp;For Ungroup Order value need to be like [802,803,804,805,806,807,815,816,817,839,840,841,842,844,845,808,809,810,811,812,813,814]'
                  example:
                    - WidgetGroupID: 333
                      WidgetIDs:
                        - 810
                        - 813
                        - 804
                        - 807
                        - 817
                    - WidgetGroupID: 335
                      WidgetIDs:
                        - 802
                        - 815
                        - 842
                        - 805
                        - 808
                        - 811
                        - 845
            example:
              SortType: '1'
              SortOrder:
                - WidgetGroupID: 333
                  WidgetIDs:
                    - 810
                    - 813
                    - 804
                    - 807
                    - 817
                - WidgetGroupID: 335
                  WidgetIDs:
                    - 802
                    - 815
                    - 842
                    - 805
                    - 808
                    - 811
                    - 845
      responses:
