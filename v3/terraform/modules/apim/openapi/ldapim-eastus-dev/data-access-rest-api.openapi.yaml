openapi: 3.0.1
info:
  title: Data Access REST API
  description: This API allow web application users to interact with the LIFEDATA data-access service.
  termsOfService: https://www.lifedatacorp.com/lifedata-terms-of-use/
  contact:
    name: Lifedata Corp
    url: https://www.lifedatacorp.com/
    email: info@lifedatacorp.com
  license:
    name: Lifedata license
    url: https://www.lifedatacorp.com/license
  version: '1.0'
servers:
  - url: https://api.dev.lifedatadev.com/data-access
paths:
  '/dataaccess/{StudyID}/data-file/{DataDownloadID}':
    get:
      tags:
        - Data Access
      summary: Populate data file
      description: This will populate data file
      operationId: get-dataaccess-studyid-data-file-datadownloadid
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: DataDownloadID
          in: path
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
  '/datarequest/{StudyID}':
    get:
      tags:
        - DataRequest
      summary: Get All DataRequests
      description: This will return all the DataRequests that belongs to user
      operationId: get-datarequest-studyid
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataRequestListItem'
              example:
                RequestDetail:
                  - DataDownloadID: 12
                    OrganizationID: 121
                    StudyID: 1123
                    StudyTitle: Test Study
                    StudyVersion: 1
                    SessionType: 1
                    ReportType: 1
                    DataFromDT: '2023-01-12T00:00:01.0000000+00:00'
                    DataToDT: '2023-01-12T00:00:01.0000000+00:00'
                    DateFormat: 1
                    TimeFormat: '1'
                    ReportResponseTime: '1'
                    IncludeSessionTime: '1'
                    IncludeDisplayLogic: '1'
                    IncludeTrigger: '1'
                    IncludeScore: '1'
                    IncludeCompletedSessionOnly: '1'
                    RequestDT: '2023-01-12T00:00:01.0000000+00:00'
                    TotalRecords: 1350
                    ApproximateTimeSec: 500
                    NumberOfFiles: 1
                    NumberOfCompletedFiles: 1
                    StatusType: 1
                    RequestedBy: amalesh.debnath@gmail.com
                DataFiles:
                  - DataDownloadID: 1
                    FilePath: ContainerName/Folder Name
                    FileName: 123.csv
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
    post:
      tags:
        - DataRequest
      summary: Add a Data Request
      description: This will add a new Data Request
      operationId: post-datarequest-studyid-studyversion-studyversion
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: StudyVersion
          in: query
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing the Data Request information
        content:
          application/json:
            schema:
              type: object
              properties:
                SessionType:
                  enum:
                    - 1
                    - 2
                    - 3
                    - 4
                  type: integer
                  description: "&nbsp;&nbsp;1 = Start-Up Session<br>\n&nbsp;&nbsp;2 = Check-In Session<br>\n&nbsp;&nbsp;3 = Notification Session<br>\n&nbsp;&nbsp;4 = Closeout Session\n"
                  example: 1
                SessionIDs:
                  type: string
                  description: Session IDs separated by coma
                  example: '2,3,4'
                ReportType:
                  enum:
                    - 1
                    - 2
                    - 3
                    - 4
                  type: integer
                  description: "&nbsp;&nbsp;1 = Long Data<br>\n&nbsp;&nbsp;2 = Wide Data<br>\n&nbsp;&nbsp;3 = Summary Data<br>\n&nbsp;&nbsp;4 = Photo Data\n"
                  example: 1
                DataFromDT:
                  type: string
                  description: this value need to in datetime format
                  example: '2023-01-12 00:00:01'
                DataToDT:
                  type: string
                  description: this value need to in datetime format
                  example: '2024-01-12 23:59:59'
                DateFormat:
                  type: integer
                  description: "&nbsp;&nbsp;1 = mm/dd/yyyy<br>\n&nbsp;&nbsp;2 = yyyy/mm/dd<br>\n&nbsp;&nbsp;3 = dd/mm/yyyy\n"
                  example: 1
                TimeFormat:
                  enum:
                    - '0'
                    - '1'
                  type: boolean
                  description: "&nbsp;&nbsp;1 = 24 Hours<br>\n&nbsp;&nbsp;0 = 12 Hours\n"
                  example: '1'
                ReportResponseTime:
                  enum:
                    - '0'
                    - '1'
                  type: boolean
                  description: "&nbsp;&nbsp;1 = second<br>\n&nbsp;&nbsp;0 = millisecond\n"
                  example: '1'
                IncludeSessionTime:
                  enum:
                    - '0'
                    - '1'
                  type: boolean
                  description: "&nbsp;&nbsp;1 = Yes<br>\n&nbsp;&nbsp;0 = No\n"
                  example: '1'
                IncludeDisplayLogic:
                  enum:
                    - '0'
                    - '1'
                  type: boolean
                  description: "&nbsp;&nbsp;1 = Yes<br>\n&nbsp;&nbsp;0 = No\n"
                  example: '1'
                IncludeTrigger:
                  enum:
                    - '0'
                    - '1'
                  type: boolean
                  description: "&nbsp;&nbsp;1 = Yes<br>\n&nbsp;&nbsp;0 = No\n"
                  example: '1'
                IncludeScore:
                  enum:
                    - '0'
                    - '1'
                  type: boolean
                  description: "&nbsp;&nbsp;1 = Yes<br>\n&nbsp;&nbsp;0 = No\n"
                  example: '1'
                IncludeCompletedSessionOnly:
                  enum:
                    - '0'
                    - '1'
                  type: boolean
                  description: "&nbsp;&nbsp;1 = Yes<br>\n&nbsp;&nbsp;0 = No\n"
                  example: '1'
            example:
              SessionType: 1
              SessionIDs: '2004-02-03'
              ReportType: 1
              DataFromDT: '2023-01-12T00:00:01.0000000+00:00'
              DataToDT: '2024-01-12T23:59:59.0000000+00:00'
              DateFormat: 1
              TimeFormat: '1'
              ReportResponseTime: '1'
              IncludeSessionTime: '1'
              IncludeDisplayLogic: '1'
              IncludeTrigger: '1'
              IncludeScore: '1'
              IncludeCompletedSessionOnly: '1'
      responses:
        '201':
          description: Created
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
  '/datarequest/{StudyID}/{DataDownloadID}':
    get:
      tags:
        - DataRequest
      summary: Get a Data Request detail identified by DataDownloadID
      description: This will return the Data Request detail identified by DataDownloadID
      operationId: get-datarequest-studyid-datadownloadid
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: DataDownloadID
          in: path
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  RequestDetail:
                    type: object
                    properties:
                      DataDownloadID:
                        type: integer
                        example: 12
                      OrganizationID:
                        type: integer
                        example: 121
                      StudyID:
                        type: integer
                        example: 1123
                      StudyTitle:
                        type: string
                        example: Test Study
                      StudyVersion:
                        type: integer
                        example: 1
                      SessionType:
                        enum:
                          - 1
                          - 2
                          - 3
                          - 4
                        type: integer
                        description: "&nbsp;&nbsp;1 = Start-Up Session<br>\n&nbsp;&nbsp;2 = Check-In Session<br>\n&nbsp;&nbsp;3 = Notification Session<br>\n&nbsp;&nbsp;4 = Closeout Session\n"
                        example: 1
                      ReportType:
                        enum:
                          - 1
                          - 2
                          - 3
                          - 4
                        type: integer
                        description: "&nbsp;&nbsp;1 = Long Data<br>\n&nbsp;&nbsp;2 = Wide Data<br>\n&nbsp;&nbsp;3 = Summary Data<br>\n&nbsp;&nbsp;4 = Photo Data\n"
                        example: 1
                      DataFromDT:
                        type: string
                        description: this value need to in datetime format
                        example: '2023-01-12 00:00:01'
                      DataToDT:
                        type: string
                        description: this value need to in datetime format
                        example: '2023-01-12 00:00:01'
                      DateFormat:
                        enum:
                          - 1
                          - 2
                          - 3
                        type: integer
                        description: "&nbsp;&nbsp;1 = mm/dd/yyyy<br>\n&nbsp;&nbsp;2 = yyyy/mm/dd<br>\n&nbsp;&nbsp;3 = dd/mm/yyyy\n"
                        example: 1
                      TimeFormat:
                        enum:
                          - '0'
                          - '1'
                        type: boolean
                        description: "&nbsp;&nbsp;1 = 24 Hours<br>\n&nbsp;&nbsp;0 = 12 Hours\n"
                        example: '1'
                      ReportResponseTime:
                        enum:
                          - '0'
                          - '1'
                        type: boolean
                        description: "&nbsp;&nbsp;1 = second<br>\n&nbsp;&nbsp;0 = millisecond\n"
                        example: '1'
                      IncludeSessionTime:
                        enum:
                          - '0'
                          - '1'
                        type: boolean
                        description: "&nbsp;&nbsp;1 = Yes<br>\n&nbsp;&nbsp;0 = No\n"
                        example: '1'
                      IncludeDisplayLogic:
                        enum:
                          - '0'
                          - '1'
                        type: boolean
                        description: "&nbsp;&nbsp;1 = Yes<br>\n&nbsp;&nbsp;0 = No\n"
                        example: '1'
                      IncludeTrigger:
                        enum:
                          - '0'
                          - '1'
                        type: boolean
                        description: "&nbsp;&nbsp;1 = Yes<br>\n&nbsp;&nbsp;0 = No\n"
                        example: '1'
                      IncludeScore:
                        enum:
                          - '0'
                          - '1'
                        type: boolean
                        description: "&nbsp;&nbsp;1 = Yes<br>\n&nbsp;&nbsp;0 = No\n"
                        example: '1'
                      IncludeCompletedSessionOnly:
                        enum:
                          - '0'
                          - '1'
                        type: boolean
                        description: "&nbsp;&nbsp;1 = Yes<br>\n&nbsp;&nbsp;0 = No\n"
                        example: '1'
                      RequestDT:
                        type: string
                        description: this value need to in datetime format
                        example: '2023-01-12 00:00:01'
                      TotalRecords:
                        type: integer
                        example: 1350
                      ApproximateTimeSec:
                        type: integer
                        example: 500
                      NumberOfFiles:
                        type: integer
                        example: 1
                      NumberOfCompletedFiles:
                        type: integer
                        example: 1
                      StatusType:
                        enum:
                          - 0
                          - 1
                          - 2
                          - 3
                          - 4
                          - 5
                        type: integer
                        description: "&nbsp;&nbsp;1 = Request Submitted<br>\n&nbsp;&nbsp;2 = Request Processing is in Progress<br>\n&nbsp;&nbsp;3 = Completed<br>\n&nbsp;&nbsp;4 = Error<br>\n&nbsp;&nbsp;5 = No Data Found<br>\n&nbsp;&nbsp;0 = Deleted\n"
                        example: 1
                      RequestedBy:
                        type: string
                        description: this will contain the email id of the person who requested this data file
                        example: amalesh.debnath@gmail.com
                  SessionIDs:
                    type: array
                    items:
                      type: object
                      properties:
                        DataDownloadID:
                          type: integer
                          example: 1
                        SessionID:
                          type: integer
                          example: 1
                  DataFiles:
                    type: array
                    items:
                      type: object
                      properties:
                        DataDownloadID:
                          type: integer
                          example: 1
                        FilePath:
                          type: string
                          example: ContainerName/Folder Name
                        FileName:
                          type: string
                          example: 123.csv
              example:
                RequestDetail:
                  DataDownloadID: 12
                  OrganizationID: 121
                  StudyID: 1123
                  StudyTitle: Test Study
                  StudyVersion: 1
                  SessionType: 1
                  ReportType: 1
                  DataFromDT: '2023-01-12T00:00:01.0000000+00:00'
                  DataToDT: '2023-01-12T00:00:01.0000000+00:00'
                  DateFormat: 1
                  TimeFormat: '1'
                  ReportResponseTime: '1'
                  IncludeSessionTime: '1'
                  IncludeDisplayLogic: '1'
                  IncludeTrigger: '1'
                  IncludeScore: '1'
                  IncludeCompletedSessionOnly: '1'
                  RequestDT: '2023-01-12T00:00:01.0000000+00:00'
                  TotalRecords: 1350
                  ApproximateTimeSec: 500
                  NumberOfFiles: 1
                  NumberOfCompletedFiles: 1
                  StatusType: 1
                  RequestedBy: amalesh.debnath@gmail.com
                SessionIDs:
                  - DataDownloadID: 1
                    SessionID: 1
                DataFiles:
                  - DataDownloadID: 1
                    FilePath: ContainerName/Folder Name
                    FileName: 123.csv
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
    delete:
      tags:
        - DataRequest
      summary: Delete the Data Request with DataDownloadID
      description: This will delete the Data Request identified by the provided DataDownloadID
      operationId: delete-datarequest-studyid-datadownloadid
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: DataDownloadID
          in: path
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
  '/{StudyID}/dashboards':
    get:
      tags:
        - Data Visualization (Dashboard)
      summary: Get All Dashboards from a Study
      description: This will return all the dashboards from a Study
      operationId: get-studyid-dashboards-studyversion-studyversion
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: StudyVersion
          in: query
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    DashboardVOs:
                      type: array
                      items:
                        type: object
                        properties:
                          StudyID:
                            type: integer
                            example: 1
                          DashboardID:
                            type: integer
                            example: 1
                          IsDefault:
                            type: boolean
                            description: '0 = No, 1 = Yes'
                            example: true
                          DashboardType:
                            enum:
                              - 1
                              - 2
                            type: integer
                            description: "&nbsp;&nbsp;1 = Standard<br>\n&nbsp;&nbsp;2 = Participant Monitoring\n"
                            example: 1
                          ShowFor:
                            enum:
                              - 1
                              - 2
                              - 3
                            type: integer
                            description: "&nbsp;&nbsp;1 = Individual Only<br>\n&nbsp;&nbsp;2 = Group Only<br>\n&nbsp;&nbsp;3 = Both\n"
                            example: 1
                          DashboardName:
                            type: string
                            example: Test Dashboard
                          IdentifiedBy:
                            enum:
                              - 1
                              - 2
                            type: integer
                            description: "&nbsp;&nbsp;1 = Participant ID<br>\n&nbsp;&nbsp;2 = Prompt Response\n"
                            example: 1
                          Description:
                            type: string
                            example: Test Dashboard
                          IsPublished:
                            enum:
                              - '0'
                              - '1'
                            type: boolean
                            description: "&nbsp;&nbsp;0 = No<br>\n&nbsp;&nbsp;1 = Yes\n"
                            example: true
                          CreatedBy:
                            type: string
                            description: Email of the user who created the dashboard
                            example: kevin@lifedatacorp.com
                          CreationDate:
                            type: string
                            description: DateTime when the dashboard was created
                            example: '2023-08-01 01:02:03'
                    ParticipantVOs:
                      type: array
                      items:
                        type: object
                        properties:
                          ParticipantID:
                            type: integer
                            description: Unique identifier for the participant
                            example: 1
                          LifeDataID:
                            type: integer
                            description: Unique LifeData identifier for the participant
                            example: 1001
              example:
                - DashboardVOs:
                    - StudyID: 1
                      DashboardID: 1
                      IsDefault: true
                      DashboardType: 1
                      ShowFor: 1
                      DashboardName: Test Dashboard
                      IdentifiedBy: 1
                      Description: Test Dashboard
                      IsPublished: true
                      CreatedBy: kevin@lifedatacorp.com
                      CreationDate: '2023-08-01T01:02:03.0000000+00:00'
                  ParticipantVOs:
                    - ParticipantID: 1
                      LifeDataID: 1001
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
    post:
      tags:
        - Data Visualization (Dashboard)
      summary: Add a Dashboard to the Study
      description: This will add a new Dashboard to the Study
      operationId: post-studyid-dashboards-studyversion-studyversion
      parameters:
        - name: StudyID
          in: path
          required: true
          schema:
            type: integer
        - name: StudyVersion
          in: query
          required: true
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        description: JSON Object containing the Dashboard information
        content:
          application/json:
            schema:
              type: object
              properties:
                DashboardType:
                  enum:
                    - 1
                    - 2
                  type: integer
                  description: "&nbsp;&nbsp;1 = Standard<br>\n&nbsp;&nbsp;2 = Participant Monitoring\n"
                  example: 1
                ShowFor:
                  enum:
                    - 1
                    - 2
                    - 3
                  type: integer
                  description: "&nbsp;&nbsp;1 = Individual Only<br>\n&nbsp;&nbsp;2 = Group Only<br>\n&nbsp;&nbsp;3 = Both\n"
                  example: 1
                DashboardName:
                  type: string
                  example: Test Dashboard
                NumberOfQuestionsPerSession:
                  type: integer
                  example: 1
                IdentifiedBy:
                  enum:
                    - 1
                    - 2
                  type: integer
                  description: "&nbsp;&nbsp;1 = Participant ID<br>\n&nbsp;&nbsp;2 = Prompt Response\n"
                  example: 1
                Description:
                  type: string
                  example: Test Dashboard
                IsPublished:
                  enum:
                    - '0'
                    - '1'
                  type: boolean
                  description: "&nbsp;&nbsp;0 = No<br>\n&nbsp;&nbsp;1 = Yes\n"
                  example: true
                ReportingPeriod:
                  enum:
                    - 1
                    - 2
                    - 3
                    - 4
                    - 5
                    - 6
                    - 7
                  type: integer
                  description: "&nbsp;&nbsp;1 = Lifetime<br>\n&nbsp;&nbsp;2 = 24 Hours<br>\n&nbsp;&nbsp;3 = 7 days<br>\n&nbsp;&nbsp;4 = 10 days<br>\n&nbsp;&nbsp;5 = 15 days<br>\n&nbsp;&nbsp;6 = 30 days<br>\n&nbsp;&nbsp;7 = Custom\n"
                  example: 1
                OrderByGroupFlag:
                  enum:
                    - '0'
                    - '1'
                  type: boolean
                  description: "&nbsp;&nbsp;0 = No<br>\n&nbsp;&nbsp;1 = Yes\n"
                  example: true
                StartDate:
                  type: string
                  example: '2025-01-01T00:00:00Z'
                EndDate:
                  type: string
                  example: '2025-05-05T00:00:00Z'
                ParticipantIDs:
                  type: string
                  description: Comma separated Participant IDs
                  example: '1,2,3'
                AddDefaultTemplate:
                  enum:
                    - '0'
                    - '1'
                  type: boolean
                  description: "&nbsp;&nbsp;0 = No<br>\n&nbsp;&nbsp;1 = Yes\n"
                  example: '1'
                IsDefault:
                  enum:
                    - '0'
                    - '1'
                  type: boolean
                  description: "&nbsp;&nbsp;0 = No<br>\n&nbsp;&nbsp;1 = Yes\n"
                  example: '1'
            example:
              DashboardType: 1
              ShowFor: 1
              DashboardName: Test Dashboard
              NumberOfQuestionsPerSession: 1
              IdentifiedBy: 1
              Description: Test Dashboard
              IsPublished: true
              ReportingPeriod: 1
              OrderByGroupFlag: true
              StartDate: '2025-01-01T00:00:00.0000000+00:00'
              EndDate: '2025-05-05T00:00:00.0000000+00:00'
              ParticipantIDs: '2003-01-02'
              AddDefaultTemplate: '1'
              IsDefault: '1'
      responses:
        '201':
          description: Created
        '400':
          description: Bad Request. Check API Spec for correct request Parameters.
        '401':
          description: Authorization Token is missing or invalid
        '500':
          description: Internal Server Error
